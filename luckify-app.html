<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lucky Window</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #080808;
    --surface:  #0f0f0f;
    --surface2: #141414;
    --border:   #1c1c1c;
    --muted:    #3a3a3a;
    --subtle:   #555;
    --text:     #e8e8e8;
    --dim:      #888;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'DM Sans', sans-serif;
    --serif:    'DM Serif Display', serif;

    --pink-bg:   #4a1040; --pink-text:   #f9c8ee; --pink-acc: #D030A0;
    --orange-bg: #3d1a00; --orange-text: #ffd6a0; --orange-acc: #E87020;
    --blue-bg:   #0a1e35; --blue-text:   #a8d4f5; --blue-acc: #4080E0;
    --yellow-bg: #2a2200; --yellow-text: #fff1a0; --yellow-acc: #F0C020;
    --green-bg:  #0e1f10; --green-text:  #b8f0c0; --green-acc: #6EC25A;
    --purple-bg: #1a0a2e; --purple-text: #d4b8f5; --purple-acc: #8A2BE2;
    --red-bg:    #2e0a08; --red-text:    #ffc0bc; --red-acc: #E04030;
    --brown-bg:  #1a0f08; --brown-text:  #d4b898; --brown-acc: #A97040;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; -webkit-font-smoothing: antialiased; }

  .view { display: none; min-height: 100vh; }
  .view.active { display: block; }

  /* ── ADMIN ── */
  #admin { max-width: 680px; margin: 0 auto; padding: 40px 20px 80px; }
  .wordmark { font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; color: var(--subtle); text-transform: uppercase; margin-bottom: 12px; }
  .admin-title { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; margin-bottom: 40px; }
  .field-group { margin-bottom: 28px; }
  label { display: block; font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; color: var(--subtle); text-transform: uppercase; margin-bottom: 8px; }
  input[type="text"], select { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: var(--sans); font-size: 15px; padding: 12px 14px; border-radius: 6px; outline: none; transition: border-color 0.15s; appearance: none; }
  input[type="text"]:focus, select:focus { border-color: var(--muted); }
  .month-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .zone-grid-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; color: var(--subtle); text-transform: uppercase; margin-bottom: 12px; }
  .zone-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .dow-label { font-family: var(--mono); font-size: 8px; color: var(--muted); text-align: center; padding: 4px 0; letter-spacing: 0.1em; }
  .day-cell-admin { position: relative; aspect-ratio: 1; border-radius: 4px; cursor: pointer; background: var(--surface); border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; transition: transform 0.1s; user-select: none; }
  .day-cell-admin:hover { transform: scale(1.05); }
  .day-cell-admin.empty { background: transparent; border-color: transparent; cursor: default; }
  .day-cell-admin.empty:hover { transform: none; }
  .day-cell-admin .dn { font-family: var(--mono); font-size: 11px; font-weight: 700; line-height: 1; }
  .day-cell-admin .zl { font-family: var(--mono); font-size: 6px; font-weight: 700; letter-spacing: 0.05em; opacity: 0.8; }
  .zc-pink   { background: var(--pink-bg)   !important; border-color: var(--pink-bg)   !important; }
  .zc-orange { background: var(--orange-bg) !important; border-color: var(--orange-bg) !important; }
  .zc-blue   { background: var(--blue-bg)   !important; border-color: var(--blue-bg)   !important; }
  .zc-yellow { background: var(--yellow-bg) !important; border-color: var(--yellow-bg) !important; }
  .zc-green  { background: var(--green-bg)  !important; border-color: var(--green-bg)  !important; }
  .zc-purple { background: var(--purple-bg) !important; border-color: var(--purple-bg) !important; }
  .zc-red    { background: var(--red-bg)    !important; border-color: var(--red-bg)    !important; }
  .zc-brown  { background: var(--brown-bg)  !important; border-color: var(--brown-bg)  !important; }
  .zc-pink   .dn, .zc-pink   .zl { color: var(--pink-text); }
  .zc-orange .dn, .zc-orange .zl { color: var(--orange-text); }
  .zc-blue   .dn, .zc-blue   .zl { color: var(--blue-text); }
  .zc-yellow .dn, .zc-yellow .zl { color: var(--yellow-text); }
  .zc-green  .dn, .zc-green  .zl { color: var(--green-text); }
  .zc-purple .dn, .zc-purple .zl { color: var(--purple-text); }
  .zc-red    .dn, .zc-red    .zl { color: var(--red-text); }
  .zc-brown  .dn, .zc-brown  .zl { color: var(--brown-text); }

  /* ── ZONE PICKER ── */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 100; align-items: center; justify-content: center; }
  .overlay.open { display: flex; }
  .zone-picker { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; width: 280px; }
  .picker-title { font-family: var(--mono); font-size: 11px; color: var(--subtle); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 14px; text-align: center; }
  .picker-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .zone-opt { padding: 10px 8px; border-radius: 6px; cursor: pointer; font-family: var(--mono); font-size: 11px; font-weight: 700; text-align: center; letter-spacing: 0.05em; transition: opacity 0.1s, transform 0.1s; border: none; }
  .zone-opt:hover { opacity: 0.85; transform: scale(1.02); }
  .zone-opt-clear { grid-column: span 2; background: var(--surface); border: 1px solid var(--border) !important; color: var(--muted); padding: 8px; border-radius: 6px; cursor: pointer; font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-align: center; transition: border-color 0.1s; }
  .zone-opt-clear:hover { border-color: var(--subtle) !important; color: var(--dim); }

  /* ── GENERATE ── */
  .generate-btn { width: 100%; background: var(--text); color: var(--bg); border: none; border-radius: 6px; padding: 14px; font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; margin-top: 32px; transition: opacity 0.15s; }
  .generate-btn:hover { opacity: 0.88; }
  .share-box { display: none; margin-top: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .share-box.visible { display: block; }
  .share-label { font-family: var(--mono); font-size: 10px; color: var(--subtle); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; }
  .share-url { font-family: var(--mono); font-size: 12px; color: var(--text); word-break: break-all; margin-bottom: 12px; line-height: 1.6; }
  .copy-btn { background: transparent; border: 1px solid var(--border); color: var(--dim); font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; padding: 8px 14px; border-radius: 4px; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
  .copy-btn:hover { border-color: var(--muted); color: var(--text); }
  .copy-btn.copied { border-color: var(--green-acc); color: var(--green-acc); }

  /* ── CLIENT ── */
  #client { max-width: 500px; margin: 0 auto; padding: 24px 16px 80px; }
  .client-wordmark { font-family: var(--mono); font-size: 9px; letter-spacing: 0.22em; color: var(--subtle); text-transform: uppercase; margin-bottom: 6px; }
  .client-name { font-family: var(--mono); font-size: 20px; font-weight: 700; letter-spacing: -0.01em; color: var(--text); }
  .client-month { font-family: var(--mono); font-size: 11px; color: var(--dim); margin-top: 2px; letter-spacing: 0.08em; margin-bottom: 24px; }
  .cal-dow-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 3px; }
  .cal-dow { font-family: var(--mono); font-size: 8px; color: var(--muted); text-align: center; padding: 4px 0; letter-spacing: 0.1em; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-day { aspect-ratio: 1; border-radius: 6px; background: var(--surface); border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; transition: transform 0.12s, box-shadow 0.12s; position: relative; }
  .cal-day:hover { transform: scale(1.06); z-index: 2; }
  .cal-day.today { box-shadow: 0 0 0 2px white; }
  .cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
  .cal-day.empty:hover { transform: none; }
  .cal-day .day-num { font-family: var(--mono); font-size: 13px; font-weight: 700; line-height: 1; }
  .cal-day .day-zone { font-family: var(--mono); font-size: 5px; font-weight: 700; letter-spacing: 0.06em; opacity: 0.85; }
  .cal-day.zc-pink   { background: var(--pink-bg);   border-color: var(--pink-bg);   }
  .cal-day.zc-orange { background: var(--orange-bg); border-color: var(--orange-bg); }
  .cal-day.zc-blue   { background: var(--blue-bg);   border-color: var(--blue-bg);   }
  .cal-day.zc-yellow { background: var(--yellow-bg); border-color: var(--yellow-bg); }
  .cal-day.zc-green  { background: var(--green-bg);  border-color: var(--green-bg);  }
  .cal-day.zc-purple { background: var(--purple-bg); border-color: var(--purple-bg); }
  .cal-day.zc-red    { background: var(--red-bg);    border-color: var(--red-bg);    }
  .cal-day.zc-brown  { background: var(--brown-bg);  border-color: var(--brown-bg);  }
  .cal-day.zc-pink   .day-num, .cal-day.zc-pink   .day-zone { color: var(--pink-text); }
  .cal-day.zc-orange .day-num, .cal-day.zc-orange .day-zone { color: var(--orange-text); }
  .cal-day.zc-blue   .day-num, .cal-day.zc-blue   .day-zone { color: var(--blue-text); }
  .cal-day.zc-yellow .day-num, .cal-day.zc-yellow .day-zone { color: var(--yellow-text); }
  .cal-day.zc-green  .day-num, .cal-day.zc-green  .day-zone { color: var(--green-text); }
  .cal-day.zc-purple .day-num, .cal-day.zc-purple .day-zone { color: var(--purple-text); }
  .cal-day.zc-red    .day-num, .cal-day.zc-red    .day-zone { color: var(--red-text); }
  .cal-day.zc-brown  .day-num, .cal-day.zc-brown  .day-zone { color: var(--brown-text); }

  /* ── LEGEND ── */
  .legend { margin-top: 28px; display: flex; flex-wrap: wrap; gap: 6px; }
  .legend-chip { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: 0.06em; padding: 4px 8px; border-radius: 3px; }
  .client-footer { margin-top: 28px; font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 0.12em; text-align: center; }

  /* ── DAY SHEET (Level 1) ── */
  .bottom-sheet { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: flex-end; justify-content: center; }
  .bottom-sheet.open { display: flex; }
  .sheet-inner { background: var(--surface); border-top: 1px solid var(--border); border-radius: 16px 16px 0 0; padding: 20px 20px 40px; width: 100%; max-width: 500px; animation: slideUp 0.22s ease-out; max-height: 90vh; overflow-y: auto; }
  @keyframes slideUp { from { transform: translateY(30px); opacity:0; } to { transform: translateY(0); opacity:1; } }
  .sheet-handle { width: 36px; height: 4px; background: var(--muted); border-radius: 2px; margin: 0 auto 20px; }
  .sheet-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; }
  .sheet-date { font-family: var(--mono); font-size: 10px; color: var(--dim); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 4px; }
  .sheet-zone-name { font-family: var(--serif); font-size: 28px; font-weight: 700; }
  .sheet-archetype { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; opacity: 0.6; margin-top: 2px; text-transform: uppercase; }
  .sheet-tagline { font-family: var(--sans); font-size: 14px; font-weight: 300; margin-top: 4px; opacity: 0.65; margin-bottom: 6px; }
  .sheet-identity { font-family: var(--sans); font-size: 13px; line-height: 1.65; opacity: 0.75; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .sheet-close { background: var(--bg); border: 1px solid var(--border); color: var(--muted); font-size: 16px; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-left: 12px; transition: color 0.15s; }
  .sheet-close:hover { color: var(--text); }

  /* ── WINDOW DIRECTIVE ── */
  .window-block { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 14px 16px; margin-bottom: 20px; }
  .window-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; opacity: 0.4; margin-bottom: 6px; }
  .window-directive { font-family: var(--sans); font-size: 13px; line-height: 1.6; opacity: 0.75; }

  /* ── SCORE ROWS ── */
  .scores-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; opacity: 0.4; margin-bottom: 12px; }
  .score-rows { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .score-row { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 8px 10px; border-radius: 6px; border: 1px solid transparent; transition: border-color 0.15s, background 0.15s; }
  .score-row:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); }
  .score-row .tap-hint { font-family: var(--mono); font-size: 8px; letter-spacing: 0.1em; opacity: 0.35; margin-left: auto; flex-shrink: 0; white-space: nowrap; }
  .score-emoji { font-size: 16px; width: 22px; flex-shrink: 0; text-align: center; }
  .score-cat { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.05em; width: 80px; flex-shrink: 0; }
  .score-bar-wrap { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
  .score-bar { height: 100%; border-radius: 3px; transition: width 0.4s ease-out; }
  .score-val { font-family: var(--mono); font-size: 11px; color: var(--dim); width: 28px; text-align: right; flex-shrink: 0; }

  /* ── POKER / LIFE GUIDANCE ── */
  .guidance-blocks { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 4px; }
  .guidance-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 14px; }
  .guidance-card-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.4; margin-bottom: 8px; }
  .guidance-card-text { font-family: var(--sans); font-size: 12px; line-height: 1.65; opacity: 0.8; }

  /* ── CATEGORY DEEP DIVE (Level 2) ── */
  .deep-sheet { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300; align-items: flex-end; justify-content: center; }
  .deep-sheet.open { display: flex; }
  .deep-inner { background: var(--surface2); border-top: 1px solid var(--border); border-radius: 16px 16px 0 0; padding: 20px 20px 50px; width: 100%; max-width: 500px; animation: slideUp 0.2s ease-out; max-height: 88vh; overflow-y: auto; }
  .deep-back { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; color: var(--dim); cursor: pointer; margin-bottom: 20px; padding: 6px 0; transition: color 0.15s; }
  .deep-back:hover { color: var(--text); }
  .deep-back svg { width: 14px; height: 14px; }
  .deep-header { margin-bottom: 24px; }
  .deep-cat-emoji { font-size: 24px; margin-bottom: 8px; }
  .deep-cat-name { font-family: var(--serif); font-size: 26px; margin-bottom: 4px; }
  .deep-cat-zone { font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; opacity: 0.45; margin-bottom: 12px; }
  .deep-score-display { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .deep-score-num { font-family: var(--mono); font-size: 36px; font-weight: 700; line-height: 1; }
  .deep-score-bar-wrap { flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
  .deep-score-bar { height: 100%; border-radius: 4px; transition: width 0.5s ease-out; }
  .deep-section { margin-bottom: 24px; }
  .deep-section-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.35; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .deep-section-label::after { content:''; flex:1; height:1px; background: rgba(255,255,255,0.05); }
  .deep-guidance-text { font-family: var(--sans); font-size: 14px; line-height: 1.72; color: var(--text); opacity: 0.82; margin-bottom: 12px; }
  .deep-insight-text { font-family: var(--sans); font-size: 13px; line-height: 1.68; opacity: 0.6; }
  .deep-traits { display: flex; flex-direction: column; gap: 8px; }
  .deep-trait { background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.05); border-radius: 6px; padding: 12px 14px; }
  .deep-trait-name { font-family: var(--serif); font-size: 15px; margin-bottom: 4px; }
  .deep-trait-sub { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; opacity: 0.4; text-transform: uppercase; margin-bottom: 8px; }
  .deep-trait-desc { font-family: var(--sans); font-size: 12px; line-height: 1.6; opacity: 0.7; }
  .deep-polarity { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
  .deep-pole { background: rgba(255,255,255,0.02); border-radius: 4px; padding: 8px 10px; }
  .deep-pole-label { font-family: var(--mono); font-size: 8px; letter-spacing: 0.14em; opacity: 0.35; margin-bottom: 4px; }
  .deep-pole-items { font-family: var(--sans); font-size: 11px; line-height: 1.55; opacity: 0.65; }
  .deep-window-note { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-left-width: 3px; border-radius: 4px; padding: 12px 14px; margin-top: 12px; }
  .deep-window-note p { font-family: var(--sans); font-size: 12px; line-height: 1.65; opacity: 0.7; }

  @media (max-width: 380px) {
    .cal-day .day-num { font-size: 11px; }
    .guidance-blocks { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ADMIN -->
<div id="admin" class="view active">
  <div style="max-width:680px;margin:0 auto;padding:40px 20px 80px">
    <div class="wordmark">luckify.me</div>
    <div class="admin-title">// CALENDAR GENERATOR</div>
    <div class="field-group">
      <label>Client Handle</label>
      <input type="text" id="clientName" placeholder="e.g. mkcrusher" autocomplete="off" autocapitalize="off">
    </div>
    <div class="field-group">
      <div class="month-row">
        <div><label>Month</label>
          <select id="selMonth">
            <option value="0">January</option><option value="1">February</option>
            <option value="2">March</option><option value="3">April</option>
            <option value="4">May</option><option value="5">June</option>
            <option value="6">July</option><option value="7">August</option>
            <option value="8">September</option><option value="9">October</option>
            <option value="10">November</option><option value="11">December</option>
          </select>
        </div>
        <div><label>Year</label><select id="selYear"></select></div>
      </div>
    </div>
    <div class="field-group">
      <div class="zone-grid-label">Tap each day to assign zone</div>
      <div class="zone-grid" id="adminGrid"></div>
    </div>
    <button class="generate-btn" onclick="generateLink()">GENERATE LINK →</button>
    <div class="share-box" id="shareBox">
      <div class="share-label">Share with client</div>
      <div class="share-url" id="shareUrl"></div>
      <button class="copy-btn" id="copyBtn" onclick="copyLink()">COPY LINK</button>
    </div>
  </div>
</div>

<!-- ZONE PICKER -->
<div class="overlay" id="pickerOverlay" onclick="closePicker(event)">
  <div class="zone-picker">
    <div class="picker-title">SELECT ZONE</div>
    <div class="picker-options" id="pickerOptions"></div>
  </div>
</div>

<!-- CLIENT -->
<div id="client" class="view">
  <div style="max-width:500px;margin:0 auto;padding:24px 16px 80px">
    <div class="client-wordmark">Lucky Window // luckify.me</div>
    <div class="client-name" id="clientNameDisplay"></div>
    <div class="client-month" id="clientMonthDisplay"></div>
    <div class="cal-dow-row">
      <div class="cal-dow">SUN</div><div class="cal-dow">MON</div>
      <div class="cal-dow">TUE</div><div class="cal-dow">WED</div>
      <div class="cal-dow">THU</div><div class="cal-dow">FRI</div>
      <div class="cal-dow">SAT</div>
    </div>

/* ═══════════════════════════════════════════════
   SCORING
═══════════════════════════════════════════════ */
const BASE_WEIGHTS = {
  Orange: { Action:10, Strategy:8,  Discipline:8, Social:6, Creativity:6,  Risk:10 },
  Blue:   { Action:5,  Strategy:10, Discipline:4, Social:6, Creativity:8,  Risk:6  },
  Red:    { Action:9,  Strategy:5,  Discipline:3, Social:5, Creativity:4,  Risk:9  },
  Green:  { Action:6,  Strategy:6,  Discipline:9, Social:6, Creativity:5,  Risk:4  },
  Yellow: { Action:5,  Strategy:6,  Discipline:6, Social:9, Creativity:6,  Risk:5  },
  Purple: { Action:3,  Strategy:7,  Discipline:6, Social:4, Creativity:10, Risk:3  },
  Pink:   { Action:8,  Strategy:6,  Discipline:3, Social:7, Creativity:10, Risk:8  },
  Brown:  { Action:2,  Strategy:4,  Discipline:4, Social:3, Creativity:4,  Risk:2  },
};
const MULT = { Orange:2.57, Blue:2.04, Red:2.25, Green:1.70, Yellow:0.75, Purple:0.50, Pink:1.50, Brown:1.00 };

function getZoneScores(zone) {
  const w = BASE_WEIGHTS[zone]; const m = MULT[zone];
  if (!w || !m) return [];
  const raw = Object.entries(w).map(([cat,wt]) => ({ cat, raw: wt*m })).sort((a,b)=>b.raw-a.raw);
  const zMax = raw[0].raw;
  return raw.map(r => ({ cat: r.cat, normalized: Math.round((r.raw/zMax)*100)/10 }));
}

/* ═══════════════════════════════════════════════
   ADMIN SETUP
═══════════════════════════════════════════════ */
const adminDayZones = {};
let pickerTargetDay = null;

function initAdmin() {
  const now = new Date();
  const ys = document.getElementById('selYear');
  for (let y = now.getFullYear(); y <= now.getFullYear()+2; y++) {
    const o = document.createElement('option'); o.value=y; o.textContent=y; ys.appendChild(o);
  }
  document.getElementById('selMonth').value = now.getMonth();
  document.getElementById('selMonth').addEventListener('change', renderAdminGrid);
  document.getElementById('selYear').addEventListener('change', renderAdminGrid);

  const po = document.getElementById('pickerOptions');
  ZONE_NAMES.forEach(z => {
    const btn = document.createElement('button');
    btn.className = 'zone-opt';
    btn.style.background = ZONES[z].bg; btn.style.color = ZONES[z].text;
    btn.textContent = z.toUpperCase(); btn.onclick = () => assignZone(z);
    po.appendChild(btn);
  });
  const clr = document.createElement('div');
  clr.className = 'zone-opt-clear'; clr.textContent = '— CLEAR —'; clr.onclick = () => assignZone(null);
  po.appendChild(clr);
  renderAdminGrid();
}

function getAdminMY() { return { month: parseInt(document.getElementById('selMonth').value), year: parseInt(document.getElementById('selYear').value) }; }

function renderAdminGrid() {
  const { month, year } = getAdminMY();
  const dim = new Date(year, month+1, 0).getDate();
  const fdow = new Date(year, month, 1).getDay();
  const grid = document.getElementById('adminGrid');
  grid.innerHTML = '';
  ['S','M','T','W','T','F','S'].forEach(d => { const el=document.createElement('div'); el.className='dow-label'; el.textContent=d; grid.appendChild(el); });
  for (let i=0; i<fdow; i++) { const el=document.createElement('div'); el.className='day-cell-admin empty'; grid.appendChild(el); }
  for (let d=1; d<=dim; d++) {
    const el = document.createElement('div'); el.className='day-cell-admin'; el.dataset.day=d;
    const zone = adminDayZones[`${year}-${month}-${d}`] || null;
    applyZoneToAdmin(el, d, zone); el.onclick = () => openPicker(d); grid.appendChild(el);
  }
}

function applyZoneToAdmin(el, day, zone) {
  el.className = 'day-cell-admin'; el.innerHTML = '';
  if (zone) {
    el.classList.add(ZONES[zone].cls);
    const dn=document.createElement('div'); dn.className='dn'; dn.textContent=day;
    const zl=document.createElement('div'); zl.className='zl'; zl.textContent=zone.substring(0,3).toUpperCase();
    el.appendChild(dn); el.appendChild(zl);
  } else {
    const dn=document.createElement('div'); dn.className='dn'; dn.style.color='#333'; dn.textContent=day; el.appendChild(dn);
  }
}

function openPicker(day) { pickerTargetDay=day; document.getElementById('pickerOverlay').classList.add('open'); }
function closePicker(e) { if (e.target===document.getElementById('pickerOverlay')) document.getElementById('pickerOverlay').classList.remove('open'); }

function assignZone(zone) {
  const { month, year } = getAdminMY();
  const key = `${year}-${month}-${pickerTargetDay}`;
  if (zone) adminDayZones[key]=zone; else delete adminDayZones[key];
  document.querySelectorAll('#adminGrid .day-cell-admin').forEach(c => { if (parseInt(c.dataset.day)===pickerTargetDay) applyZoneToAdmin(c, pickerTargetDay, zone||null); });
  document.getElementById('pickerOverlay').classList.remove('open');
}

function generateLink() {
  const name = document.getElementById('clientName').value.trim();
  if (!name) { document.getElementById('clientName').focus(); return; }
  const { month, year } = getAdminMY();
  const entries = Object.entries(adminDayZones)
    .filter(([k]) => { const p=k.split('-'); return parseInt(p[1])===month && parseInt(p[0])===year; })
    .map(([k,z]) => `${k.split('-')[2]}:${z}`);
  const params = new URLSearchParams({ n:name, m:month, y:year, d:entries.join(',') });
  const url = `${location.origin}${location.pathname}?${params.toString()}`;
  document.getElementById('shareUrl').textContent = url;
  document.getElementById('shareBox').classList.add('visible');
  document.getElementById('copyBtn').textContent = 'COPY LINK';
  document.getElementById('copyBtn').classList.remove('copied');
}

function copyLink() {
  navigator.clipboard.writeText(document.getElementById('shareUrl').textContent).then(() => {
    const btn = document.getElementById('copyBtn'); btn.textContent='COPIED ✓'; btn.classList.add('copied');
  });
}

/* ═══════════════════════════════════════════════
   CLIENT VIEW
═══════════════════════════════════════════════ */
function initClient(params) {
  const name  = params.get('n') || 'OPERATOR';
  const month = parseInt(params.get('m'));
  const year  = parseInt(params.get('y'));
  const raw   = params.get('d') || '';
  const dayZones = {};
  raw.split(',').forEach(pair => { const [d,z]=pair.split(':'); if(d&&z) dayZones[parseInt(d)]=z; });

  document.getElementById('clientNameDisplay').textContent = name.toUpperCase();
  document.getElementById('clientMonthDisplay').textContent = `${MONTHS[month]} ${year}`;
  renderClientCal(year, month, dayZones);
  renderLegend(dayZones);
  document.getElementById('admin').classList.remove('active');
  document.getElementById('client').classList.add('active');
}

function renderClientCal(year, month, dayZones) {
  const dim = new Date(year, month+1, 0).getDate();
  const fdow = new Date(year, month, 1).getDay();
  const now = new Date();
  const today = (now.getFullYear()===year && now.getMonth()===month) ? now.getDate() : -1;
  const grid = document.getElementById('clientGrid');
  grid.innerHTML = '';
  for (let i=0; i<fdow; i++) { const el=document.createElement('div'); el.className='cal-day empty'; grid.appendChild(el); }
  for (let d=1; d<=dim; d++) {
    const zone = dayZones[d] || null;
    const el = document.createElement('div'); el.className='cal-day';
    if (d===today) el.classList.add('today');
    if (zone && ZONES[zone]) el.classList.add(ZONES[zone].cls);
    const dn=document.createElement('div'); dn.className='day-num';
    if (!zone) dn.style.color='#333';
    dn.textContent=d; el.appendChild(dn);
    if (zone) {
      const dz=document.createElement('div'); dz.className='day-zone'; dz.textContent=zone.substring(0,3).toUpperCase(); el.appendChild(dz);
      el.onclick = () => openDaySheet(d, zone, month, year);
    }
    grid.appendChild(el);
  }
}

function renderLegend(dayZones) {
  const present = [...new Set(Object.values(dayZones))];
  const sorted = ZONE_NAMES.filter(z=>present.includes(z));
  const wrap = document.getElementById('clientLegend'); wrap.innerHTML='';
  sorted.forEach(z => {
    const chip=document.createElement('div'); chip.className='legend-chip';
    chip.style.background=ZONES[z].bg; chip.style.color=ZONES[z].text; chip.textContent=z.toUpperCase(); wrap.appendChild(chip);
  });
}

let currentZone = null;

function openDaySheet(day, zone, month, year) {
  currentZone = zone;

  document.getElementById('sheetDate').textContent = `${MONTHS[month].substring(0,3).toUpperCase()} ${day}, ${year}`;

  const zn = document.getElementById('sheetZoneName');
  zn.textContent = zone.toUpperCase(); zn.style.color = z.text;

  const arch = document.getElementById('sheetArchetype');
  arch.textContent = rd ? rd.archetype : ''; arch.style.color = z.text;

  document.getElementById('sheetTagline').textContent = CELL_LINE[zone] || '';
  document.getElementById('sheetTagline').style.color = z.text;

  document.getElementById('sheetIdentity').textContent = rd ? rd.identity : '';
  document.getElementById('sheetIdentity').style.color = z.text;

  document.getElementById('daySheetInner').style.background = z.bg;
  document.getElementById('daySheetInner').style.borderColor = z.bg;

  // Wave pattern
  if (rd && rd.waveNote) {
    document.getElementById('windowDirective').textContent = rd.waveNote;
    document.getElementById('windowDirective').style.color = z.text;
    document.getElementById('windowBlock').style.borderColor = `${z.acc}33`;
  }

  // Scores
  const scores = getZoneScores(zone);
  const rows = document.getElementById('scoreRows');
  rows.innerHTML = '';
  scores.forEach(({ cat, normalized }) => {
    const row = document.createElement('div');
    row.className = 'score-row';
    row.innerHTML = `
      <div class="score-emoji">${CAT_EMOJI[cat]||'·'}</div>
      <div class="score-cat" style="color:${z.text}">${cat}</div>
      <div class="score-bar-wrap"><div class="score-bar" style="width:0%;background:${z.acc}" data-pct="${normalized*10}"></div></div>
      <div class="score-val" style="color:${z.text};opacity:0.6">${normalized.toFixed(1)}</div>
      <div class="tap-hint" style="color:${z.text};pointer-events:none">TAP →</div>
    `;
    row.onclick = () => openDeepSheet(cat, zone);
    rows.appendChild(row);
  });

  // Poker / Life guidance
  const gb = document.getElementById('guidanceBlocks');
  gb.innerHTML = '';
  const cats = rd ? rd.categories : null;
  if (cats) {
    const topCat = scores[0]?.cat;
    const catData = topCat ? cats[topCat] : null;
    if (catData) {
      gb.innerHTML = `
        <div class="guidance-card" style="border-color:${z.acc}22">
          <div class="guidance-card-label" style="color:${z.text}">♠ POKER</div>
          <div class="guidance-card-text" style="color:${z.text}">${catData.pokerNote}</div>
        </div>
        <div class="guidance-card" style="border-color:${z.acc}22">
          <div class="guidance-card-label" style="color:${z.text}">◈ DAILY LIFE</div>
          <div class="guidance-card-text" style="color:${z.text}">${catData.lifeNote}</div>
        </div>
      `;
    }
  }

  document.getElementById('daySheet').classList.add('open');

  requestAnimationFrame(() => requestAnimationFrame(() => {
    rows.querySelectorAll('.score-bar').forEach(bar => { bar.style.width = bar.dataset.pct + '%'; });
  }));
}

function closeDaySheet(e) {
  if (e.target===document.getElementById('daySheet')) document.getElementById('daySheet').classList.remove('open');
}

/* ═══════════════════════════════════════════════

function openDeepSheet(cat, zone) {
  const z = ZONES[zone];

  const scoreObj = scores.find(s=>s.cat===cat);
  const catData = rd && rd.categories ? rd.categories[cat] : null;

  document.getElementById('deepEmoji').textContent = CAT_EMOJI[cat]||'·';

  document.getElementById('deepCatZone').style.color = z.text + '99';

  const scoreNum = document.getElementById('deepScoreNum');
  scoreNum.textContent = scoreObj ? scoreObj.normalized.toFixed(1) : '—';

  const bar = document.getElementById('deepScoreBar');

  document.getElementById('deepInner').style.background = z.bg;

        <div class="deep-guidance-text" style="color:${z.text}">${catData.headline}</div>
        <div class="deep-guidance-text" style="color:${z.text};opacity:0.75;font-size:13px;line-height:1.68">${catData.guidance}</div>
      </div>
    `;

    // Insight layer
    if (catData.insight) {
      html += `
        <div class="deep-window-note" style="border-left-color:${z.acc}">
          <p style="color:${z.text}">${catData.insight}</p>
        </div>
        <div style="margin-bottom:20px"></div>
      `;
    }

    // Poker / Life
    html += `
      <div class="deep-section">
        <div class="deep-section-label" style="color:${z.text}">BY CONTEXT</div>
        <div class="guidance-blocks">
          <div class="guidance-card" style="border-color:${z.acc}22">
            <div class="guidance-card-label" style="color:${z.text}">♠ POKER</div>

        html += `

            <div class="deep-trait-sub" style="color:${z.text}">${t.sub}</div>
            <div class="deep-trait-desc" style="color:${z.text}">${t.desc}</div>

        if (t.upside || t.downside) {
