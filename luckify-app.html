<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lucky Window</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inconsolata:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════════
     PIP-BOY FIELD TERMINAL — LUCKIFY.ME
     Phosphor Orange · CRT Monochrome · Scan-Line UI
  ═══════════════════════════════════════════════ */

  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Courier+Prime:wght@400;700&display=swap');

  :root {
    /* Core Phosphor Palette */
    --ph:        #FF8C00;   /* primary phosphor orange */
    --ph-dim:    #CC6600;   /* dimmed orange */
    --ph-dark:   #6A3800;   /* dark orange for borders */
    --ph-glow:   #FF8C0020; /* glow tint */
    --ph-faint:  #FF8C0006; /* very faint tint */

    --bg:        #0D0C0B;   /* near-black with warm tint */
    --surface:   #141210;
    --surface2:  #1A1714;
    --border:    #FFFFFF0C;
    --border2:   #FFFFFF16;

    --text:      #E8E4DC;
    --dim:       #9C9890;
    --muted:     #524E48;
    --subtle:    #2E2B28;

    /* OFF-state: amber-red danger tint */
    --off-color:   #FF3A1A;
    --off-dim:     #CC3010;
    --off-bg:      #FF3A1A0A;
    --off-border:  #FF3A1A30;

    --mono:  'Inconsolata', 'Courier New', monospace;
    --vt:    'Orbitron', sans-serif;

    /* Zone colors — filtered through phosphor as tints */
    --pink-bg:   #1A0515; --pink-text:   #FF80E0; --pink-acc: #FF40C0;
    --orange-bg: #150900; --orange-text: #FFB060; --orange-acc: #FF8020;
    --blue-bg:   #020B18; --blue-text:   #60B0FF; --blue-acc:  #2080FF;
    --yellow-bg: #141000; --yellow-text: #FFE040; --yellow-acc: #FFD000;
    --green-bg:  #030A03; --green-text:  #80FF80; --green-acc:  #40FF40;
    --purple-bg: #0C0318; --purple-text: #C080FF; --purple-acc: #A040FF;
    --red-bg:    #150200; --red-text:    #FF8070; --red-acc:    #FF3020;
    --brown-bg:  #0D0600; --brown-text:  #C09060; --brown-acc:  #A07040;
  }

  /* ── SCANLINE OVERLAY ── */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    -webkit-font-smoothing: none;
    image-rendering: pixelated;
    position: relative;
  }

  /* CRT scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.10) 2px,
      rgba(0,0,0,0.10) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* CRT vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.40) 100%);
    pointer-events: none;
    z-index: 9998;
  }

  /* Screen flicker — subtle, on load */
  @keyframes crtOn {
    0%   { opacity: 0; filter: brightness(3) blur(2px); }
    15%  { opacity: 1; filter: brightness(1.4) blur(0); }
    20%  { opacity: 0.85; }
    25%  { opacity: 1; }
    100% { opacity: 1; filter: brightness(1); }
  }
  .view.active { animation: crtOn 0.5s ease-out forwards; }

  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  /* Phosphor text glow */
  .ph-glow {
    text-shadow: 0 0 6px var(--ph), 0 0 14px var(--ph-dim);
  }

  .view { display: none; min-height: 100vh; }
  .view.active { display: block; }

  /* ── ADMIN ── */
  #admin { max-width: 680px; margin: 0 auto; padding: 40px 20px 80px; }

  .wordmark {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .admin-title {
    font-family: var(--vt);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--ph);
    text-shadow: 0 0 8px var(--ph), 0 0 20px var(--ph-dim);
    letter-spacing: 0.05em;
    margin-bottom: 40px;
    line-height: 1;
  }

  /* Terminal prompt blink */
  .admin-title::after {
    content: '█';
    animation: blink 1.1s step-end infinite;
    margin-left: 4px;
    font-size: 28px;
  }

  label {
    display: block;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .field-group { margin-bottom: 28px; }

  input[type="text"], select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 15px;
    padding: 12px 14px;
    border-radius: 0;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    appearance: none;
    -webkit-appearance: none;
    text-shadow: 0 0 4px var(--ph-dim);
  }

  input[type="text"]:focus, select:focus {
    border-color: var(--dim);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.15), 0 0 10px rgba(255,255,255,0.06);
  }

  .month-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .zone-grid-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .zone-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }

  .dow-label {
    font-family: var(--mono);
    font-size: 7px;
    color: var(--muted);
    text-align: center;
    padding: 4px 0;
    letter-spacing: 0.1em;
  }

  .day-cell-admin {
    position: relative;
    aspect-ratio: 1;
    border-radius: 0;
    cursor: pointer;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    transition: border-color 0.1s, box-shadow 0.1s;
    user-select: none;
  }

  .day-cell-admin:hover {
    border-color: var(--ph);
    box-shadow: 0 0 6px var(--ph-glow);
  }

  .day-cell-admin.empty { background: transparent; border-color: transparent; cursor: default; }
  .day-cell-admin.empty:hover { border-color: transparent; box-shadow: none; }

  .day-cell-admin .dn { font-family: var(--mono); font-size: 11px; font-weight: 700; line-height: 1; }
  .day-cell-admin .zl { font-family: var(--mono); font-size: 5px; font-weight: 700; letter-spacing: 0.05em; opacity: 0.9; }

  /* ── ZONE PICKER ── */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 100; align-items: center; justify-content: center; }
  .overlay.open { display: flex; }

  .zone-picker {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 0;
    padding: 20px;
    width: 280px;
    box-shadow: 0 0 30px var(--ph-glow), inset 0 0 30px rgba(0,0,0,0.4);
  }

  .picker-title {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 14px;
    text-align: center;
  }

  .picker-options { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

  .zone-opt {
    padding: 10px 8px;
    border-radius: 0;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    text-align: center;
    letter-spacing: 0.08em;
    transition: opacity 0.1s, box-shadow 0.1s;
    border: none;
  }

  .zone-opt:hover { opacity: 0.8; box-shadow: 0 0 8px currentColor; }

  .zone-opt-clear {
    grid-column: span 2;
    background: transparent;
    border: 1px solid var(--border2) !important;
    color: var(--muted);
    padding: 8px;
    border-radius: 0;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-align: center;
    transition: border-color 0.1s, color 0.1s;
  }

  .zone-opt-clear:hover { border-color: var(--ph-dark) !important; color: var(--dim); }

  /* ── GENERATE BTN ── */
  .generate-btn {
    width: 100%;
    background: transparent;
    color: var(--text);
    border: 1px solid var(--muted);
    border-radius: 0;
    padding: 14px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 32px;
    transition: background 0.15s, box-shadow 0.15s;
    text-shadow: 0 0 6px var(--ph-dim);
  }

  .generate-btn:hover {
    background: rgba(255,255,255,0.04);
    border-color: var(--dim);
    box-shadow: none;
  }

  .share-box {
    display: none;
    margin-top: 20px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 0;
    padding: 16px;
  }

  .share-box.visible { display: block; }

  .share-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .share-url {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ph-dim);
    word-break: break-all;
    margin-bottom: 12px;
    line-height: 1.6;
  }

  .copy-btn {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    padding: 8px 14px;
    border-radius: 0;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, box-shadow 0.15s;
  }

  .copy-btn:hover { border-color: var(--ph-dark); color: var(--dim); }
  .copy-btn.copied { border-color: var(--ph); color: var(--ph); box-shadow: 0 0 8px var(--ph-glow); }

  /* ── CLIENT ── */
  #client { max-width: 500px; margin: 0 auto; padding: 24px 16px 80px; }

  .client-wordmark {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.16em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .client-name {
    font-family: var(--vt);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.06em;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--ph);
    text-shadow: 0 0 8px var(--ph), 0 0 20px var(--ph-dim);
    letter-spacing: 0.05em;
    line-height: 1;
    margin-bottom: 2px;
  }

  .client-month {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--dim);
    margin-top: 2px;
    letter-spacing: 0.14em;
    margin-bottom: 20px;
  }

  .cal-dow-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 3px; }

  .cal-dow {
    font-family: var(--mono);
    font-size: 7px;
    color: var(--muted);
    text-align: center;
    padding: 4px 0;
    letter-spacing: 0.1em;
  }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }

  .cal-day {
    aspect-ratio: 1;
    border-radius: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    transition: border-color 0.12s, box-shadow 0.12s;
    position: relative;
  }

  .cal-day:hover {
    border-color: var(--ph-dark);
    box-shadow: 0 0 8px var(--ph-glow);
    z-index: 2;
  }

  .cal-day.today {
    border-color: var(--ph) !important;
    box-shadow: 0 0 0 1px var(--ph), 0 0 12px var(--ph-glow) !important;
  }

  .cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
  .cal-day.empty:hover { border-color: transparent; box-shadow: none; }

  .cal-day .day-num { font-family: var(--mono); font-size: 13px; font-weight: 700; line-height: 1; }
  .cal-day .day-zone { font-family: var(--mono); font-size: 5px; font-weight: 700; letter-spacing: 0.06em; opacity: 0.85; }

  /* Zone color classes — all on phosphor-dark base */
  .zc-pink   { background: var(--pink-bg)   !important; border-color: var(--pink-acc)44   !important; }
  .zc-orange { background: var(--orange-bg) !important; border-color: var(--orange-acc)44 !important; }
  .zc-blue   { background: var(--blue-bg)   !important; border-color: var(--blue-acc)44   !important; }
  .zc-yellow { background: var(--yellow-bg) !important; border-color: var(--yellow-acc)44 !important; }
  .zc-green  { background: var(--green-bg)  !important; border-color: var(--ph)44  !important; }
  .zc-purple { background: var(--purple-bg) !important; border-color: var(--purple-acc)44 !important; }
  .zc-red    { background: var(--red-bg)    !important; border-color: var(--red-acc)44    !important; }
  .zc-brown  { background: var(--brown-bg)  !important; border-color: var(--brown-acc)44  !important; }

  .zc-pink   .day-num, .zc-pink   .day-zone,
  .zc-pink   .dn,      .zc-pink   .zl { color: var(--pink-text); text-shadow: 0 0 4px var(--pink-acc)88; }
  .zc-orange .day-num, .zc-orange .day-zone,
  .zc-orange .dn,      .zc-orange .zl { color: var(--orange-text); text-shadow: 0 0 4px var(--orange-acc)88; }
  .zc-blue   .day-num, .zc-blue   .day-zone,
  .zc-blue   .dn,      .zc-blue   .zl { color: var(--blue-text); text-shadow: 0 0 4px var(--blue-acc)88; }
  .zc-yellow .day-num, .zc-yellow .day-zone,
  .zc-yellow .dn,      .zc-yellow .zl { color: var(--yellow-text); text-shadow: 0 0 4px var(--yellow-acc)88; }
  .zc-green  .day-num, .zc-green  .day-zone,
  .zc-green  .dn,      .zc-green  .zl { color: var(--green-text); text-shadow: 0 0 4px var(--green-acc)88; }
  .zc-purple .day-num, .zc-purple .day-zone,
  .zc-purple .dn,      .zc-purple .zl { color: var(--purple-text); text-shadow: 0 0 4px var(--purple-acc)88; }
  .zc-red    .day-num, .zc-red    .day-zone,
  .zc-red    .dn,      .zc-red    .zl { color: var(--red-text); text-shadow: 0 0 4px var(--red-acc)88; }
  .zc-brown  .day-num, .zc-brown  .day-zone,
  .zc-brown  .dn,      .zc-brown  .zl { color: var(--brown-text); text-shadow: 0 0 4px var(--brown-acc)88; }

  /* ── LEGEND ── */
  .legend { margin-top: 20px; display: flex; flex-wrap: wrap; gap: 4px; }
  .legend-chip {
    font-family: var(--mono);
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 3px 7px;
    border-radius: 0;
    border: 1px solid currentColor;
    opacity: 0.75;
  }
  .client-footer {
    margin-top: 24px;
    font-family: var(--mono);
    font-size: 8px;
    color: var(--muted);
    letter-spacing: 0.16em;
    text-align: center;
    opacity: 0.5;
  }

  /* ── SCORE BARS — SEGMENTED PIP-BOY STYLE ── */
  .scores-label {
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--dim);
    opacity: 0.7;
    margin-bottom: 10px;
  }

  .score-rows { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

  .score-row {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 7px 10px;
    border: 1px solid transparent;
    transition: border-color 0.12s, background 0.12s;
  }

  .score-row:hover { background: var(--ph-faint); border-color: var(--border2); }
  .score-row .tap-hint { font-family: var(--mono); font-size: 7px; letter-spacing: 0.1em; color: var(--muted); margin-left: auto; flex-shrink: 0; white-space: nowrap; }
  .score-emoji { font-size: 14px; width: 18px; flex-shrink: 0; text-align: center; }
  .score-cat { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.06em; width: 80px; flex-shrink: 0; }

  /* Segmented pip bar */
  .score-bar-wrap {
    flex: 1;
    display: flex;
    gap: 2px;
    height: 10px;
    align-items: center;
  }

  .score-pip {
    flex: 1;
    height: 8px;
    border-radius: 0;
    transition: background 0.4s ease-out, box-shadow 0.4s ease-out;
  }

  .score-val {
    font-family: var(--vt);
    font-size: 13px;
    font-weight: 600;
    line-height: 1;
    width: 28px;
    text-align: right;
    flex-shrink: 0;
  }

  /* ── DAY SHEET (Level 1) ── */
  .bottom-sheet {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.90);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .bottom-sheet.open { display: flex; }

  .sheet-inner {
    background: var(--surface);
    border-top: 1px solid var(--border2);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    border-radius: 0;
    padding: 20px 20px 44px;
    width: 100%;
    max-width: 500px;
    animation: slideUp 0.2s ease-out;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.6);
  }

  .sheet-handle {
    width: 40px;
    height: 2px;
    background: var(--ph-dark);
    margin: 0 auto 20px;
  }

  .sheet-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 4px; }

  .sheet-date {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .sheet-zone-name {
    font-family: var(--vt);
    font-size: 28px;
    line-height: 1;
    letter-spacing: 0.06em;
    text-shadow: 0 0 10px currentColor, 0 0 24px currentColor;
  }

  .sheet-archetype {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.16em;
    color: var(--dim);
    margin-top: 3px;
    text-transform: uppercase;
  }

  .sheet-tagline {
    font-family: var(--vt);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.06em;
    margin-top: 4px;
    line-height: 1.3;
    color: var(--ph-dim);
    margin-bottom: 6px;
  }

  .sheet-identity {
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    color: var(--dim);
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }

  .sheet-close {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--muted);
    font-size: 14px;
    width: 30px;
    height: 30px;
    border-radius: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-left: 12px;
    transition: border-color 0.12s, color 0.12s;
  }
  .sheet-close:hover { border-color: var(--ph-dark); color: var(--dim); }

  /* ── WINDOW DIRECTIVE ── */
  .window-block {
    background: var(--ph-faint);
    border: 1px solid var(--border);
    border-left: 2px solid var(--ph-dark);
    padding: 12px 14px;
    margin-bottom: 18px;
  }

  .window-label {
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .window-directive {
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.65;
    color: var(--text);
  }

  /* ── GUIDANCE CARDS (ON/OFF in day sheet) ── */
  .guidance-blocks { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 4px; }
  .guidance-card { border: 1px solid; padding: 12px 14px; border-radius: 0; }
  .guidance-card-label { font-family: var(--mono); font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 8px; font-weight: 700; }
  .guidance-card-text { font-family: var(--mono); font-size: 11px; line-height: 1.65; }

  /* ── DEEP SHEET (Level 2) ── */
  .deep-sheet {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.94);
    z-index: 300;
    align-items: flex-end;
    justify-content: center;
  }
  .deep-sheet.open { display: flex; }

  .deep-inner {

/* SCORING ENGINE — see TWO-LAYER SCORING MODEL below */

/* ── PIP BAR BUILDER ─────────────────────────────
   score 0-3  → off  (dim red)
   score 4-6  → mid  (zone color at 50%)
   score 7-10 → on   (full zone color + glow)
─────────────────────────────────────────────── */
// fillPct: 0-1 zone-relative fill  |  state: 'on'|'mid'|'off'
function buildPips(fillPct, state, acc, total, cls) {
  const filled = Math.round(fillPct * total);
  let html = '';
  for (let i = 0; i < total; i++) {
    let bg, shadow;
    if (i < filled) {
      if (state === 'off') {
        bg = 'var(--off-dim)';
        shadow = '0 0 3px var(--off-color)66';
      } else if (state === 'mid') {
        bg = acc + 'AA';
        shadow = 'none';
      } else {
        bg = acc;
        shadow = `0 0 5px ${acc}99`;
      }
    } else {
      bg = 'var(--surface2)';
      shadow = 'none';
    }
    html += `<div class="${cls}" style="background:${bg};box-shadow:${shadow}"></div>`;
  }
  return html;
}

/* ═══════════════════════════════════════════════
   TWO-LAYER SCORING MODEL
   Layer 1 — Rhythm Power: empirical (Sharpe-calibrated UFC data)
   Layer 2 — Rhythm Allocation: theoretical (rhythm framework docs)
   Formula: Category Score = Power × Allocation%, normalized globally
═══════════════════════════════════════════════ */

// Layer 1: How strong is the day overall (Sharpe-derived, normalized to Orange=10)
const RHYTHM_POWER = {
  Orange: 10.0,  // n=487, strongest validated
  Blue:    8.4,  // n=529, strong tactical
  Green:   5.0,  // n=336, reliable stabilizer
  Red:     4.5,  // n=114, positive but lower confidence
  Yellow:  3.8,  // baseline
  Pink:    3.8,  // PROVISIONAL — n=37, too small
  Brown:   3.8,  // PROVISIONAL — theory only
  Purple:  3.3,  // floor — negative empirical, non-UFC value preserved
};

// Layer 2: Where does the day express (from rhythm framework docs, sums to 1.00 per zone)
const RHYTHM_ALLOC = {
  Orange: { Action:.26, Strategy:.20, Discipline:.20, Social:.12, Creativity:.10, Risk:.12 },
  Blue:   { Action:.10, Strategy:.30, Discipline:.10, Social:.12, Creativity:.23, Risk:.15 },
  Green:  { Action:.16, Strategy:.16, Discipline:.30, Social:.16, Creativity:.12, Risk:.10 },
  Red:    { Action:.30, Strategy:.12, Discipline:.08, Social:.12, Creativity:.08, Risk:.30 },
  Yellow: { Action:.14, Strategy:.16, Discipline:.16, Social:.28, Creativity:.14, Risk:.12 },
  Purple: { Action:.08, Strategy:.22, Discipline:.18, Social:.10, Creativity:.30, Risk:.12 },
  Pink:   { Action:.20, Strategy:.15, Discipline:.08, Social:.18, Creativity:.25, Risk:.14 }, // PROVISIONAL
  Brown:  { Action:.10, Strategy:.20, Discipline:.25, Social:.20, Creativity:.15, Risk:.10 }, // PROVISIONAL
};

// Global ceiling: Orange Action = 10.0 × 0.26 = 2.60
const GLOBAL_MAX = 10.0 * 0.26;

function getZoneScores(zone) {
  const p = RHYTHM_POWER[zone];
  const alloc = RHYTHM_ALLOC[zone];
  if (!p || !alloc) return [];
  if (zone === 'Brown') return [];

  const raw = Object.entries(alloc)
    .map(([cat, a]) => ({ cat, rawScore: p * a }))
    .sort((a,b) => b.rawScore - a.rawScore);

  const zoneMax = raw[0].rawScore;
  const onThresh  = zoneMax * 0.75;
  const midThresh = zoneMax * 0.40;

  return raw.map(r => ({
    cat: r.cat,
    normalized: Math.round((r.rawScore / GLOBAL_MAX) * 100) / 10,  // globally comparable display number
    fillPct: r.rawScore / zoneMax,                                   // zone-relative visual fill
    state: r.rawScore >= onThresh ? 'on' : r.rawScore >= midThresh ? 'mid' : 'off',
  }));
}

const CELL_LINE = {
  Orange:'Make your move', Blue:'Think it through',   Red:'Careful aggression',
  Green:'Build the habit', Yellow:'Show up present',  Purple:'Go inward',
  Pink:'Full expression',  Brown:'Rest and reset',
};

/* ═══════════════════════════════════════════════
   ADMIN SETUP
═══════════════════════════════════════════════ */
const adminDayZones = {};
let pickerTargetDay = null;

function initAdmin() {
  const now = new Date();
  const ys = document.getElementById('selYear');
  for (let y = now.getFullYear(); y <= now.getFullYear()+2; y++) {
    const o = document.createElement('option'); o.value=y; o.textContent=y; ys.appendChild(o);
  }
  document.getElementById('selMonth').value = now.getMonth();
  document.getElementById('selMonth').addEventListener('change', renderAdminGrid);
  document.getElementById('selYear').addEventListener('change', renderAdminGrid);

  const po = document.getElementById('pickerOptions');
  const PICKER_COLORS = {
    Pink:   { bg: '#D030A0', text: '#fff' },
    Orange: { bg: '#E87020', text: '#fff' },
    Blue:   { bg: '#4080E0', text: '#fff' },
    Yellow: { bg: '#F0C020', text: '#1a1400' },
    Green:  { bg: '#6EC25A', text: '#0a1a08' },
    Purple: { bg: '#8A2BE2', text: '#fff' },
    Red:    { bg: '#E04030', text: '#fff' },
    Brown:  { bg: '#A97040', text: '#fff' },
  };
  ZONE_NAMES.forEach(z => {
    const btn = document.createElement('button');
    btn.className = 'zone-opt';
    btn.style.background = PICKER_COLORS[z].bg;
    btn.style.color = PICKER_COLORS[z].text;
    btn.textContent = z.toUpperCase();
    btn.onclick = () => assignZone(z);
    po.appendChild(btn);
  });
  const clr = document.createElement('div');
  clr.className = 'zone-opt-clear'; clr.textContent = '— CLEAR —'; clr.onclick = () => assignZone(null);
  po.appendChild(clr);
  renderAdminGrid();
}

function getAdminMY() { return { month: parseInt(document.getElementById('selMonth').value), year: parseInt(document.getElementById('selYear').value) }; }

function renderAdminGrid() {
  const { month, year } = getAdminMY();
  const dim = new Date(year, month+1, 0).getDate();
  const fdow = new Date(year, month, 1).getDay();
  const grid = document.getElementById('adminGrid');
  grid.innerHTML = '';
  ['S','M','T','W','T','F','S'].forEach(d => { const el=document.createElement('div'); el.className='dow-label'; el.textContent=d; grid.appendChild(el); });
  for (let i=0; i<fdow; i++) { const el=document.createElement('div'); el.className='day-cell-admin empty'; grid.appendChild(el); }
  for (let d=1; d<=dim; d++) {
    const el = document.createElement('div'); el.className='day-cell-admin'; el.dataset.day=d;
    const zone = adminDayZones[`${year}-${month}-${d}`] || null;
    applyZoneToAdmin(el, d, zone); el.onclick = () => openPicker(d); grid.appendChild(el);
  }
}

function applyZoneToAdmin(el, day, zone) {
  el.className = 'day-cell-admin'; el.innerHTML = '';
  if (zone) {
    el.classList.add(ZONES[zone].cls);
    const dn=document.createElement('div'); dn.className='dn'; dn.textContent=day;
    const zl=document.createElement('div'); zl.className='zl'; zl.textContent=zone.substring(0,3).toUpperCase();
    el.appendChild(dn); el.appendChild(zl);
  } else {
    const dn=document.createElement('div'); dn.className='dn'; dn.style.color='#333'; dn.textContent=day; el.appendChild(dn);
  }
}

function openPicker(day) { pickerTargetDay=day; document.getElementById('pickerOverlay').classList.add('open'); }
function closePicker(e) { if (e.target===document.getElementById('pickerOverlay')) document.getElementById('pickerOverlay').classList.remove('open'); }

function assignZone(zone) {
  const { month, year } = getAdminMY();
  const key = `${year}-${month}-${pickerTargetDay}`;
  if (zone) adminDayZones[key]=zone; else delete adminDayZones[key];
  document.querySelectorAll('#adminGrid .day-cell-admin').forEach(c => { if (parseInt(c.dataset.day)===pickerTargetDay) applyZoneToAdmin(c, pickerTargetDay, zone||null); });
  document.getElementById('pickerOverlay').classList.remove('open');
}

function generateLink() {
  const name = document.getElementById('clientName').value.trim();
  if (!name) { document.getElementById('clientName').focus(); return; }
  const { month, year } = getAdminMY();
  const entries = Object.entries(adminDayZones)
    .filter(([k]) => { const p=k.split('-'); return parseInt(p[1])===month && parseInt(p[0])===year; })
    .map(([k,z]) => `${k.split('-')[2]}:${z}`);
  const params = new URLSearchParams({ n:name, m:month, y:year, d:entries.join(',') });
  const url = `${location.origin}${location.pathname}?${params.toString()}`;
  document.getElementById('shareUrl').textContent = url;
  document.getElementById('shareBox').classList.add('visible');
  document.getElementById('copyBtn').textContent = 'COPY LINK';
  document.getElementById('copyBtn').classList.remove('copied');
}

function copyLink() {
  navigator.clipboard.writeText(document.getElementById('shareUrl').textContent).then(() => {
    const btn = document.getElementById('copyBtn'); btn.textContent='COPIED ✓'; btn.classList.add('copied');
  });
}

/* ═══════════════════════════════════════════════
   CLIENT VIEW
═══════════════════════════════════════════════ */
function initClient(params) {
  const name  = params.get('n') || 'OPERATOR';
  const month = parseInt(params.get('m'));
  const year  = parseInt(params.get('y'));
  const raw   = params.get('d') || '';
  const dayZones = {};
  raw.split(',').forEach(pair => { const [d,z]=pair.split(':'); if(d&&z) dayZones[parseInt(d)]=z; });

  document.getElementById('clientNameDisplay').textContent = name.toUpperCase();
  document.getElementById('clientMonthDisplay').textContent = `${MONTHS[month]} ${year}`;
  renderClientCal(year, month, dayZones);
  renderLegend(dayZones);
  // dot indicators for days with notes
  const clientN = (new URLSearchParams(window.location.search)).get('n') || 'default';
  const urlY = parseInt((new URLSearchParams(window.location.search)).get('y'));
  const urlM = parseInt((new URLSearchParams(window.location.search)).get('m'));
  if (!isNaN(urlY) && !isNaN(urlM)) refreshNoteDots(clientN, urlY, urlM);
  document.getElementById('admin').classList.remove('active');
  document.getElementById('client').classList.add('active');
}

function renderClientCal(year, month, dayZones) {
  const dim = new Date(year, month+1, 0).getDate();
  const fdow = new Date(year, month, 1).getDay();
  const now = new Date();
  const today = (now.getFullYear()===year && now.getMonth()===month) ? now.getDate() : -1;
  const grid = document.getElementById('clientGrid');
  grid.innerHTML = '';
  for (let i=0; i<fdow; i++) { const el=document.createElement('div'); el.className='cal-day empty'; grid.appendChild(el); }
  for (let d=1; d<=dim; d++) {
    const zone = dayZones[d] || null;
    const el = document.createElement('div'); el.className='cal-day';
    if (d===today) el.classList.add('today');
    if (zone && ZONES[zone]) el.classList.add(ZONES[zone].cls);
    const dn=document.createElement('div'); dn.className='day-num';
    if (!zone) dn.style.color='#333';
    dn.textContent=d; el.appendChild(dn);
    if (zone) {
      const dz=document.createElement('div'); dz.className='day-zone'; dz.textContent=zone.substring(0,3).toUpperCase(); el.appendChild(dz);
      el.onclick = () => openDaySheet(d, zone, month, year);
    }
    grid.appendChild(el);
  }
}

function renderLegend(dayZones) {
  const present = [...new Set(Object.values(dayZones))];
  const sorted = ZONE_NAMES.filter(z=>present.includes(z));
  const wrap = document.getElementById('clientLegend'); wrap.innerHTML='';
  sorted.forEach(z => {
    const chip=document.createElement('div'); chip.className='legend-chip';
    chip.style.background=ZONES[z].bg; chip.style.color=ZONES[z].text; chip.textContent=z.toUpperCase(); wrap.appendChild(chip);
  });
}

/* ═══════════════════════════════════════════════
   DAY SHEET
═══════════════════════════════════════════════ */
let currentZone = null;


/* ═══════════════════════════════════════════════
   DAY NOTES — localStorage
═══════════════════════════════════════════════ */
let _noteKey = null;
let _noteSaveTimer = null;

function noteStorageKey(name, year, month, day) {
  return `lw_note_${name}_${year}_${month}_${day}`;
}

function loadNote(name, year, month, day) {
  try { return localStorage.getItem(noteStorageKey(name, year, month, day)) || ''; }
  catch(e) { return ''; }
}

function saveNote(name, year, month, day, text) {
  try {
    const key = noteStorageKey(name, year, month, day);
    if (text.trim()) { localStorage.setItem(key, text); }
    else { localStorage.removeItem(key); }
    return true;
  } catch(e) { return false; }
}

function getAllNoteKeys(name, year, month) {
  // returns object {day: true} for days that have notes
  const result = {};
  try {
    for (let d = 1; d <= 31; d++) {
      const val = localStorage.getItem(noteStorageKey(name, year, month, d));
      if (val && val.trim()) result[d] = true;
    }
  } catch(e) {}
  return result;
}

function initNoteField(name, year, month, day) {
  _noteKey = { name, year, month, day };
  const ta = document.getElementById('dayNoteInput');
  const status = document.getElementById('noteStatus');
  if (!ta) return;

  ta.value = loadNote(name, year, month, day);
  status.textContent = '';
  status.className = 'note-status';

  // debounced auto-save on input
  ta.oninput = () => {
    clearTimeout(_noteSaveTimer);
    status.textContent = '...';
    status.className = 'note-status';
    _noteSaveTimer = setTimeout(() => {
      const ok = saveNote(_noteKey.name, _noteKey.year, _noteKey.month, _noteKey.day, ta.value);
      status.textContent = ok ? 'SAVED' : 'ERROR';
      status.className = 'note-status' + (ok ? ' saved' : '');
      refreshNoteDots(_noteKey.name, _noteKey.year, _noteKey.month);
      setTimeout(() => { status.textContent = ''; status.className = 'note-status'; }, 1800);
    }, 600);
  };
}

function refreshNoteDots(name, year, month) {
  const noted = getAllNoteKeys(name, year, month);
  document.querySelectorAll('.cal-day').forEach(el => {
    const dn = el.querySelector('.day-num');
    if (!dn) return;
    const d = parseInt(dn.textContent);
    const existing = el.querySelector('.note-dot');
    if (noted[d] && !existing) {
      const dot = document.createElement('div');
      dot.className = 'note-dot';
      el.appendChild(dot);
    } else if (!noted[d] && existing) {
      existing.remove();
    }
  });
}

function openDaySheet(day, zone, month, year) {
  currentZone = zone;
  const z = ZONES[zone];
  const rd = RHYTHM_DATA[zone];
  const wd = WINDOW_DIRECTIVES[zone];

  document.getElementById('sheetDate').textContent = `${MONTHS[month].substring(0,3).toUpperCase()} ${day}, ${year}`;

  const zn = document.getElementById('sheetZoneName');
  zn.textContent = zone.toUpperCase(); zn.style.color = z.text;

  const arch = document.getElementById('sheetArchetype');
  arch.textContent = rd ? rd.archetype : ''; arch.style.color = z.text;

  document.getElementById('sheetTagline').textContent = CELL_LINE[zone] || '';
  document.getElementById('sheetTagline').style.color = z.text;

  document.getElementById('sheetIdentity').textContent = rd ? rd.identity : '';
  document.getElementById('sheetIdentity').style.color = z.text;

  document.getElementById('daySheetInner').style.borderTopColor = z.acc + '55';

  // Wave graph
  const waveEl = document.getElementById('waveGraph');
  const svgMarkup = WAVE_SVGS[zone] || '';
  waveEl.innerHTML = svgMarkup
    ? svgMarkup + '<div class="wave-tap-hint">TAP TO EXPAND</div>'
    : '';
  if (svgMarkup) {
    waveEl.querySelector('svg').onclick = () => {
      document.getElementById('waveLightboxInner').innerHTML = svgMarkup;
      document.getElementById('waveLightbox').classList.add('open');
    };
  }
  document.getElementById('windowBlock').style.borderColor = `${z.acc}33`;

  // Scores
  const scores = getZoneScores(zone);
  const rows = document.getElementById('scoreRows');
  const gb = document.getElementById('guidanceBlocks');
  rows.innerHTML = '';
  gb.innerHTML = '';

  if (zone === 'Brown') {
    // Brown: no category scoring — show decision rule only
    const brownRd = RHYTHM_DATA['Brown'];
    rows.style.display = 'none';
    document.querySelector('.scores-label').style.display = 'none';
    gb.innerHTML = `
      <div class="guidance-card" style="border-color:${z.acc}55;background:${z.acc}08;grid-column:span 2">
        <div class="guidance-card-label" style="color:${z.acc};letter-spacing:0.18em">THE STANDARD</div>
        <div class="guidance-card-text" style="color:var(--text);font-size:13px;line-height:1.7">${brownRd?.decisionRule || 'Undeniable edge only. If you are evaluating whether it qualifies, it does not.'}</div>
      </div>
    `;
  } else {
    rows.style.display = 'flex';
    document.querySelector('.scores-label').style.display = 'block';
    scores.forEach(({ cat, normalized, fillPct, state }) => {
      const row = document.createElement('div');
      row.className = 'score-row';
      const pipHtml = buildPips(fillPct, state, z.acc, 10, 'score-pip');
      const stateColor = state === 'on' ? z.acc : state === 'mid' ? 'var(--dim)' : 'var(--off-color)';
      row.innerHTML = `
        <div class="score-emoji">${CAT_EMOJI[cat]||'·'}</div>
        <div class="score-cat" style="color:var(--text)">${cat}</div>
        <div class="score-bar-wrap">${pipHtml}</div>
        <div class="score-val" style="color:${stateColor};text-shadow:0 0 6px ${stateColor}88">${normalized.toFixed(1)}</div>
        <div class="tap-hint" style="color:var(--muted);pointer-events:none">TAP ›</div>
      `;
      row.onclick = () => openDeepSheet(cat, zone);
      rows.appendChild(row);
    });

    // Top category ON/OFF preview
    const cats = rd ? rd.categories : null;
    if (cats) {
      const topCat = scores[0]?.cat;
      const catData = topCat ? cats[topCat] : null;
      if (catData) {
        gb.innerHTML = `
          <div class="guidance-card" style="border-color:var(--ph-dark);background:var(--ph-faint)">
            <div class="guidance-card-label" style="color:${z.acc}">▲ ON  ·  ${topCat.toUpperCase()}</div>
            <div class="guidance-card-text" style="color:var(--text)">${catData.on}</div>
          </div>
          <div class="guidance-card" style="border-color:var(--off-border);background:var(--off-bg)">
            <div class="guidance-card-label" style="color:var(--off-color);text-shadow:0 0 8px var(--off-color)">▼ OFF  ·  ${topCat.toUpperCase()}</div>
            <div class="guidance-card-text" style="color:var(--off-dim)">${catData.off}</div>
          </div>
        `;
      }
    }
  }

  document.getElementById('daySheet').classList.add('open');

  // Notes
  const clientN = (new URLSearchParams(window.location.search)).get('n') || 'default';
  initNoteField(clientN, year, month, day);
}

function closeDaySheet(e) {
  if (e.target===document.getElementById('daySheet')) document.getElementById('daySheet').classList.remove('open');
}

/* ═══════════════════════════════════════════════
   DEEP SHEET (category drill-down)
═══════════════════════════════════════════════ */
function openDeepSheet(cat, zone) {
  const z = ZONES[zone];
  const rd = RHYTHM_DATA[zone];
  const scores = getZoneScores(zone);
  const scoreObj = scores.find(s=>s.cat===cat);
  const catData = rd && rd.categories ? rd.categories[cat] : null;

  document.getElementById('deepEmoji').textContent = CAT_EMOJI[cat]||'·';
  const cn = document.getElementById('deepCatName'); cn.textContent = cat; cn.style.color = z.text;
  document.getElementById('deepCatZone').textContent = `${zone.toUpperCase()}  //  ${rd?.archetype?.toUpperCase()||''}`;

  const scoreNum = document.getElementById('deepScoreNum');
  const scoreVal = scoreObj ? scoreObj.normalized : 0;
  const scoreState = scoreObj?.state || 'off';
  scoreNum.textContent = scoreObj ? scoreVal.toFixed(1) : '—';
  const scoreColor = scoreState === 'on' ? z.acc : scoreState === 'mid' ? 'var(--dim)' : 'var(--off-color)';
  scoreNum.style.color = scoreColor;
  scoreNum.style.textShadow = `0 0 10px ${scoreColor}88`;

  const barEl = document.getElementById('deepScoreBar');
  if (barEl) barEl.innerHTML = '';

  document.getElementById('deepInner').style.borderTopColor = z.acc + '44';

  const content = document.getElementById('deepContent');
  content.innerHTML = '';

  if (catData) {
    // Headline + guidance
    let html = `
      <div class="deep-section">
        <div class="deep-section-label">THE READ</div>
        <div class="deep-guidance-text" style="color:${z.acc};text-shadow:0 0 10px ${z.acc}66;font-size:15px;margin-bottom:12px">${catData.headline}</div>
        <div class="deep-guidance-text">${catData.guidance}</div>
      </div>
    `;

    // ON / OFF signals
    html += `
      <div class="deep-section">
        <div class="deep-section-label" style="color:var(--dim)">STATE CHECK</div>
        <div class="on-off-block">
          <div class="on-card">
            <div class="on-off-label" style="color:${z.acc};text-shadow:0 0 8px ${z.acc}">▲ ON</div>
            <div class="on-off-text" style="color:var(--text)">${catData.on}</div>
          </div>
          <div class="off-card">
            <div class="on-off-label" style="color:var(--off-color);text-shadow:0 0 8px var(--off-color)">▼ OFF</div>
            <div class="on-off-text" style="color:var(--off-dim)">${catData.off}</div>
          </div>
        </div>
      </div>
    `;

    // Wave note
    if (rd.waveNote) {
      html += `
        <div class="deep-window-note">
          <div style="font-family:var(--mono);font-size:8px;letter-spacing:0.2em;color:var(--muted);margin-bottom:6px">ENERGY PATTERN</div>
          <p>${rd.waveNote}</p>
        </div>
      `;
    }

    content.innerHTML = html;
  } else {
    content.innerHTML = `<div class="deep-guidance-text" style="color:${z.text};opacity:0.5">No data for this category.</div>`;
  }

  document.getElementById('deepSheet').classList.add('open');

  requestAnimationFrame(() => requestAnimationFrame(() => {
    const barEl = document.getElementById('deepScoreBar');
    if (barEl && scoreObj) barEl.innerHTML = buildPips(scoreObj.fillPct, scoreObj.state, z.acc, 10, 'deep-score-pip');
  }));
}

function closeDeepSheet(e) {
  if (e.target===document.getElementById('deepSheet')) document.getElementById('deepSheet').classList.remove('open');
}

function closeDeepSheetBtn() {
  document.getElementById('deepSheet').classList.remove('open');
}

if (urlParams.has('n') && urlParams.has('m') && urlParams.has('y')) {
  initClient(urlParams);
} else {
  initAdmin();
}
