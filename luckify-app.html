<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Luckify – Lucky Window Operator</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#0c0c0c;
color:white;
margin:0;
padding:0;
}

.wrapper{
max-width:1100px;
margin:auto;
padding:30px;
}

h1,h2,h3{
margin-top:0;
}

.admin-panel{
background:#111;
padding:20px;
border-radius:6px;
margin-bottom:30px;
}

input,select{
padding:8px;
margin:6px 0;
background:#181818;
border:1px solid #333;
color:white;
}

button{
padding:10px 16px;
background:#222;
border:1px solid #444;
color:white;
cursor:pointer;
}

button:hover{
background:#333;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
margin-top:20px;
}

.day{
background:#181818;
padding:12px;
text-align:center;
border:1px solid #333;
cursor:pointer;
}

.day:hover{
background:#222;
}

.zone-Pink{background:#ff4fa3;}
.zone-Orange{background:#ff8a3d;}
.zone-Yellow{background:#ffd84a;color:black;}
.zone-Green{background:#2ecc71;}
.zone-Blue{background:#3a8bff;}
.zone-Purple{background:#9b59b6;}
.zone-Red{background:#ff3b3b;}
.zone-Brown{background:#8b5a2b;}

.link-box{
margin-top:20px;
background:#111;
padding:14px;
word-break:break-all;
}

.client-view{
display:none;
max-width:1000px;
margin:auto;
padding:40px;
}

.client-title{
font-size:28px;
margin-bottom:20px;
}

.client-calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.client-day{
padding:14px;
text-align:center;
border:1px solid #333;
}

</style>

</head>

<body>

<div class="wrapper" id="adminMode">

<h1>Luckify Operator Panel</h1>

<div class="admin-panel">

<h3>Client Info</h3>

<label>Client Handle</label><br>
<input id="clientHandle" style="width:300px"><br>

<label>Birth Date</label><br>
<input type="date" id="birthDate"><br>

<label>Birth Time</label><br>
<input type="time" id="birthTime"><br>

<label>Birth Location</label><br>
<input id="birthLocation"><br>

<label>Current / Event Location</label><br>
<input id="eventLocation"><br>

<h3>Calendar Settings</h3>

<label>Month</label>
<select id="monthSelect"></select>

<label>Year</label>
<select id="yearSelect"></select>

<br><br>

<button onclick="generateForecast()">Generate Month Forecast</button>

<h3>Manual Override</h3>

<div id="calendar" class="calendar"></div>

<button onclick="generateLink()">Generate Client Link</button>

<div id="linkOutput" class="link-box"></div>

</div>

</div>


<div id="clientMode" class="client-view">

<div class="client-title" id="clientTitle"></div>

<div class="client-calendar" id="clientCalendar"></div>

</div>

  <script>

const ZONES = [
"Pink",
"Orange",
"Yellow",
"Green",
"Blue",
"Purple",
"Red",
"Brown"
];

let dayZones = {};

const monthSelect = document.getElementById("monthSelect");
const yearSelect = document.getElementById("yearSelect");

for(let m=0;m<12;m++){
const opt=document.createElement("option");
opt.value=m;
opt.text=m+1;
monthSelect.appendChild(opt);
}

for(let y=2024;y<2035;y++){
const opt=document.createElement("option");
opt.value=y;
opt.text=y;
yearSelect.appendChild(opt);
}

monthSelect.value=new Date().getMonth();
yearSelect.value=new Date().getFullYear();


function daysInMonth(month,year){
return new Date(year,month+1,0).getDate();
}


function renderCalendar(){

const grid=document.getElementById("calendar");
grid.innerHTML="";

const month=parseInt(monthSelect.value);
const year=parseInt(yearSelect.value);

const totalDays=daysInMonth(month,year);

for(let d=1; d<=totalDays; d++){

const key=`${year}-${month}-${d}`;

const div=document.createElement("div");
div.className="day";

if(dayZones[key]){
div.classList.add(`zone-${dayZones[key]}`);
div.innerHTML=d+"<br>"+dayZones[key];
}else{
div.innerHTML=d;
}

div.onclick=()=>{

let current=dayZones[key];
let idx=ZONES.indexOf(current);

idx++;

if(idx>=ZONES.length) idx=0;

dayZones[key]=ZONES[idx];

renderCalendar();

};

grid.appendChild(div);

}

}


function generateForecast(){

const month=parseInt(monthSelect.value);
const year=parseInt(yearSelect.value);

const totalDays=daysInMonth(month,year);

for(let d=1; d<=totalDays; d++){

const key=`${year}-${month}-${d}`;

const dateObj=new Date(year,month,d);

const zone=calculateZone(dateObj);

dayZones[key]=zone;

}

renderCalendar();

}


function calculateZone(date){

/*
Placeholder engine.

Replace this with your real
Wu Xing / BaZi scoring logic.

Right now it produces a
deterministic rotating zone.
*/

const base=date.getDate();

return ZONES[ base % ZONES.length ];

}

renderCalendar();

function generateLink(){

const handle=document.getElementById("clientHandle").value.trim() || "client";

const month=parseInt(monthSelect.value);
const year=parseInt(yearSelect.value);

const entries = Object.entries(dayZones)
  .filter(([k])=>{
    const p=k.split("-");
    return parseInt(p[0])===year && parseInt(p[1])===month;
  })
  .map(([k,z])=>{
    const day=k.split("-")[2];
    return `${day}:${z}`;
  });

const params = new URLSearchParams({
  n: handle,
  m: month,
  y: year,
  d: entries.join(",")
});

const url = `${location.origin}${location.pathname}?${params.toString()}`;

document.getElementById("linkOutput").innerText = url;

}


function renderClientCalendar(name, month, year, zoneMap){

document.getElementById("adminMode").style.display="none";
document.getElementById("clientMode").style.display="block";

document.getElementById("clientTitle").innerText = `${name} — ${month+1}/${year}`;

const grid=document.getElementById("clientCalendar");
grid.innerHTML="";

const totalDays=daysInMonth(month,year);

for(let d=1; d<=totalDays; d++){

const div=document.createElement("div");
div.className="client-day";

const zone=zoneMap[d];

if(zone){
div.classList.add(`zone-${zone}`);
div.innerHTML = d + "<br>" + zone;
}else{
div.innerHTML = d;
}

grid.appendChild(div);

}

}


function bootClientMode(){

const params=new URLSearchParams(window.location.search);

if(!(params.has("n") && params.has("m") && params.has("y"))) return;

const name=params.get("n") || "client";
const month=parseInt(params.get("m"));
const year=parseInt(params.get("y"));
const raw=params.get("d") || "";

const zoneMap={};

raw.split(",").forEach(pair=>{
  const [day,zone]=pair.split(":");
  if(day && zone){
    zoneMap[parseInt(day)] = zone;
  }
});

renderClientCalendar(name,month,year,zoneMap);

}


bootClientMode();

</script>
</body>
</html>
