<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Lucky Window Admin</title>

<style>

body{
font-family:Arial;
background:#0c0c0c;
color:white;
padding:30px;
}

h2{
margin-top:0;
}

.admin-panel{
max-width:900px;
margin:auto;
}

textarea{
width:100%;
min-height:120px;
background:#111;
border:1px solid #333;
color:white;
padding:12px;
font-family:monospace;
}

button{
background:#222;
color:white;
border:1px solid #444;
padding:10px 16px;
cursor:pointer;
}

button:hover{
background:#333;
}

.admin-buttons{
margin-top:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.admin-grid{
margin-top:20px;
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.day{
background:#181818;
padding:14px;
text-align:center;
cursor:pointer;
border:1px solid #333;
}

.day:hover{
background:#222;
}

.zone-Pink{background:#ff4fa3;}
.zone-Orange{background:#ff8a3d;}
.zone-Yellow{background:#ffd84a;color:black;}
.zone-Green{background:#2ecc71;}
.zone-Blue{background:#3a8bff;}
.zone-Purple{background:#9b59b6;}
.zone-Red{background:#ff3b3b;}

.link-output{
margin-top:20px;
background:#111;
padding:14px;
word-break:break-all;
}

</style>

</head>

<body>

<div class="admin-panel">

<h2>Lucky Window — Calendar Builder</h2>

<label>Client Handle</label>
<br>
<input id="clientHandle" style="width:300px">

<br><br>

<label>Month</label>
<select id="selMonth"></select>

<label>Year</label>
<select id="selYear"></select>

<br><br>

<h3>Paste Zone Output</h3>

<textarea id="bulkZoneInput" placeholder="2026-03-01|Pink"></textarea>

<div class="admin-buttons">

<button onclick="importFullDateZones()">Import Full-Date Format</button>

<button onclick="importCompactZones()">Import Day:Zone Format</button>

<button onclick="clearSelectedMonth()">Clear Selected Month</button>

</div>

<h3>Manual Override</h3>

<div id="adminGrid" class="admin-grid"></div>

<br>

<button onclick="generateLink()">Generate Link</button>

<div id="linkOutput" class="link-output"></div>

</div>

<script>

const ZONES=[
"Pink",
"Orange",
"Yellow",
"Green",
"Blue",
"Purple",
"Red"
];

let adminDayZones={};

const monthSelect=document.getElementById("selMonth");
const yearSelect=document.getElementById("selYear");

for(let m=0;m<12;m++){
const opt=document.createElement("option");
opt.value=m;
opt.text=m+1;
monthSelect.appendChild(opt);
}

for(let y=2024;y<2035;y++){
const opt=document.createElement("option");
opt.value=y;
opt.text=y;
yearSelect.appendChild(opt);
}

monthSelect.value=new Date().getMonth();
yearSelect.value=new Date().getFullYear();

function renderAdminGrid(){

const grid=document.getElementById("adminGrid");
grid.innerHTML="";

const month=parseInt(monthSelect.value);
const year=parseInt(yearSelect.value);

const days=new Date(year,month+1,0).getDate();

for(let d=1;d<=days;d++){

const key=`${year}-${month}-${d}`;

const div=document.createElement("div");
div.className="day";

if(adminDayZones[key]){

div.classList.add(`zone-${adminDayZones[key]}`);

div.innerHTML=d+"<br>"+adminDayZones[key];

}else{

div.innerHTML=d;

}

div.onclick=()=>{

let current=adminDayZones[key];

let idx=ZONES.indexOf(current);

idx++;

if(idx>=ZONES.length)idx=0;

adminDayZones[key]=ZONES[idx];

renderAdminGrid();

};

grid.appendChild(div);

}

}

function importFullDateZones(){

const raw=document.getElementById("bulkZoneInput").value.trim();

const lines=raw.split("\n");

let imported=0;

lines.forEach(line=>{

const parts=line.split("|");

if(parts.length!==2)return;

const date=parts[0].trim();

const zone=parts[1].trim();

const m=date.match(/^(\d+)-(\d+)-(\d+)$/);

if(!m)return;

const y=parseInt(m[1]);
const mo=parseInt(m[2])-1;
const d=parseInt(m[3]);

adminDayZones[`${y}-${mo}-${d}`]=zone;

imported++;

});

renderAdminGrid();

alert("Imported "+imported+" days");

}

function importCompactZones(){

const raw=document.getElementById("bulkZoneInput").value.trim();

const month=parseInt(monthSelect.value);
const year=parseInt(yearSelect.value);

let imported=0;

raw.split(",").forEach(pair=>{

const p=pair.split(":");

if(p.length!==2)return;

const d=parseInt(p[0]);
const zone=p[1].trim();

adminDayZones[`${year}-${month}-${d}`]=zone;

imported++;

});

renderAdminGrid();

alert("Imported "+imported+" days");

}

function clearSelectedMonth(){

const month=parseInt(monthSelect.value);
const year=parseInt(yearSelect.value);

Object.keys(adminDayZones).forEach(key=>{

const parts=key.split("-");

if(parseInt(parts[0])===year && parseInt(parts[1])===month){

delete adminDayZones[key];

}

});

renderAdminGrid();

}

function generateLink(){

const handle=document.getElementById("clientHandle").value;

const month=parseInt(monthSelect.value);
const year=parseInt(yearSelect.value);

let entries=[];

Object.entries(adminDayZones).forEach(([k,v])=>{

const parts=k.split("-");

if(parseInt(parts[0])===year && parseInt(parts[1])===month){

entries.push(parts[2]+":"+v);

}

});

const zoneString=entries.join(",");

const link=window.location.origin+window.location.pathname+
`?client=${handle}&month=${month}&year=${year}&zones=${encodeURIComponent(zoneString)}`;

document.getElementById("linkOutput").innerText=link;

}

renderAdminGrid();

</script>

</body>
</html>
